name: petrol_crowd
description: "Petrol station crowd level finder using OSM & GetX."

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  get: ^4.7.2

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_cancellable_tile_provider: ^3.0.0

  # Location
  geolocator: ^13.0.2

  # Networking
  http: ^1.4.0

  # Storage & caching
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.2.4

  # URL launcher — for phone calls & external maps fallback
  url_launcher: ^6.3.1

  # UI utilities
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  flutter_spinkit: ^5.2.1
  intl: ^0.20.2
  logger: ^2.5.0
  connectivity_plus: ^6.1.4
  permission_handler: ^11.0.1
  #for icon :
  flutter_launcher_icons: ^0.14.4
  restart_app: ^1.3.2

  # Charts
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/images/

  fonts:
    - family: arial-mt-bold
      fonts:
        - asset: assets/fonts/arial-mt-bold/arial_rounded_mt_bold.ttf

name: petrol_crowd
description: "Petrol station crowd level finder using OSM & GetX."

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  get: ^4.7.2

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # flutter_map_cancellable_tile_provider: ^3.0.0

  # Location
  geolocator: ^13.0.2

  # Networking
  http: ^1.4.0

  # Storage & caching
  get_storage: ^2.1.1

  # URL launcher — for phone calls & external maps fallback
  url_launcher: ^6.3.1

  # UI
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Build-time tool only — must NOT be in dependencies
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/images/

  fonts:
    - family: arial-mt-bold
      fonts:
        - asset: assets/fonts/arial-mt-bold/arial_rounded_mt_bold.ttf
